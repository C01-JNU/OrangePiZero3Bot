# ============================================================================
# 系统配置
# ============================================================================
system:
  # 运行模式：仅支持 "cpu"（GPU模式已移除）
  mode: "cpu"

  # 调试日志级别
  # 0: TRACE   - 最详细，仅用于开发
  # 1: DEBUG   - 调试信息
  # 2: INFO    - 常规信息（推荐）
  # 3: WARN    - 警告
  # 4: ERROR   - 错误
  # 5: CRITICAL- 严重错误
  debug_level: 2

  # 是否将日志写入文件
  log_to_file: false
  # 日志文件路径（当 log_to_file 为 true 时有效）
  log_file_path: "logs/stereo_depth.log"

# 硬件监控配置
hardware_monitor:
  enabled: true               # 是否启用（需在 main 中控制）
  interval_seconds: 2.0       # 采集间隔（秒）
  enable_gpu: true            # 是否尝试读取 GPU 温度
  enable_ddr: true            # 是否尝试读取 DDR 温度
