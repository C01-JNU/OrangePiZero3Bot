# ============================================================================
# 模型推理模块配置 (inference)
# ============================================================================
# 本配置文件用于 YOLO 目标检测器 (YOLODetector) 的参数配置。
# 支持 CPU 和 GPU (Vulkan) 两种后端，自动适应图像尺寸，支持 letterbox 预处理。
# ============================================================================

inference:
  # --------------------------------------------------------------------------
  # 模型文件配置
  # --------------------------------------------------------------------------
  model:
    # MNN 模型文件路径（相对于可执行文件所在目录）
    # 注意：可执行文件通常位于 build/bin/ 下，模型文件需放在该目录或其子目录中
    # 例如：将 yolo26n.mnn 放在 build/bin/models/ 下，则路径写 "models/yolo26n.mnn"
    path: "models/yolo26n.mnn"

    # 模型输入宽度（像素）
    # - 设置为 0 表示自动从第一帧图像确定（会根据图像尺寸按 32 的倍数向上取整）
    # - 设置为正数（如 640）则固定为该尺寸，图像会被缩放（letterbox 或拉伸）
    # 推荐使用 0 自动适配，避免因图像尺寸变化导致模型失效。
    input_width: 0

    # 模型输入高度（像素），规则同上
    input_height: 0

  # --------------------------------------------------------------------------
  # 检测阈值
  # --------------------------------------------------------------------------
  # 置信度阈值：只保留置信度大于该值的检测框
  # 取值范围：0.0 ~ 1.0，推荐 0.25 ~ 0.5
  confidence_threshold: 0.25

  # NMS (非极大值抑制) 的 IoU 阈值
  # 用于去除重叠框，值越小去重越激进
  # 取值范围：0.0 ~ 1.0，推荐 0.45 ~ 0.6
  nms_threshold: 0.45

  # 数据集类别总数（COCO 为 80，可根据模型调整）
  num_classes: 80

  # --------------------------------------------------------------------------
  # 后端与预处理
  # --------------------------------------------------------------------------
  # 是否使用 GPU 推理（Vulkan 后端）
  # true  : 使用 Vulkan GPU（需要编译 MNN 时开启 Vulkan 支持，并设置环境变量）
  # false : 使用 CPU 推理（较慢但兼容性好）
  use_gpu: false

  # 是否使用 letterbox 保持宽高比并填充灰边
  # true  : 图像按比例缩放至模型输入尺寸，多余部分填充灰色 (114,114,114)
  # false : 直接拉伸图像至模型输入尺寸（可能导致变形）
  # 推荐 true，尤其当输入图像宽高比与模型输入不一致时。
  letterbox: true

  # --------------------------------------------------------------------------
  # 测试工具专用配置（inference_test 程序使用）
  # --------------------------------------------------------------------------
  test:
    # 测试图像输入目录（相对于可执行文件所在目录）
    # 程序会递归搜索该目录下的图片文件（默认 .jpg, .jpeg, .png）
    input_dir: "images/test"

    # 检测结果输出目录（相对于可执行文件所在目录）
    # 程序会将绘制了检测框的图像保存到此目录，文件名添加 "_out" 后缀
    output_dir: "images/output"

    # 支持的图像文件扩展名（可选，默认即支持常见格式）
    # 如需要支持其他格式可添加，例如 ".bmp"
    # image_extensions: [".jpg", ".jpeg", ".png"]
