# Census 变换配置
census:
  # 窗口尺寸（奇数）
  window_width: 5
  window_height: 3

  # GPU 工作组大小
  workgroup_size_x: 32
  workgroup_size_y: 32

  # CPU 前滤波配置
  cpu_pre_filter_type: "bilateral"
  cpu_pre_median_ksize: 5
  cpu_pre_bilateral_d: 9
  cpu_pre_bilateral_sigma_color: 50.0
  cpu_pre_bilateral_sigma_space: 9.0

  # 后滤波配置
  post_filter_type: "none"
  post_filter_median_ksize: 3
  post_filter_bilateral_d: 5
  post_filter_bilateral_sigma_color: 50.0
  post_filter_bilateral_sigma_space: 5.0

  # GPU 前滤波配置
  gpu_filter_type: "bilateral"
  gpu_bilateral_d: 9                # 双边滤波直径（奇数，最大15）
  gpu_bilateral_sigma_color: 50.0
  gpu_bilateral_sigma_space: 9.0

  # Census 算法模式
  census_mode: "adaptive"
  adaptive_threshold: 18
