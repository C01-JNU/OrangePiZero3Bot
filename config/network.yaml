# ============================================================================
# 网络传输模块配置
# ============================================================================
network:
  # 目标IP地址（开发机IP）
  ip: "192.168.1.10"
  # 基础端口号（左图、右图、视差图等将使用 port, port+1, port+2 ...）
  port: 5000
  # 是否启用网络传输
  enabled: true
  # 每秒最大传输帧数（0表示不限）
  max_fps: 0
